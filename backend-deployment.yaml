apiVersion: apps/v1
kind: Deployment
metadata:
  name:  flask-backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-backend
  template:
    metadata:
      labels:
        app: flask-backend
    spec:
      containers:
      - name: flask-backend
        # TODO: Replace <DockerHub-Username> with your Docker Hub username, and use the appropriate image name and tag
        image: joannachang19901028/flask-backend:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        lifecycle:
          preStop:
            ## TODO: Implement a preStop hook that signals the running application to
            ## log that shutdown preparation has started, then waits briefly before
            ## Kubernetes sends SIGTERM to terminate the container.
            # TODO -> here we change the command to kill -USR1 1 and sleep 5
            exec:
              command: ["/bin/sh", "-c", "kill -USR1 1 && sleep 5"] 
        volumeMounts:
        - name: model-volume
          mountPath: /shared-volume
          readOnly: true  # Backend only needs read access
      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name:  flask-backend-service # TODO: Specify a unique service name if deploying multiple services
spec:
  type: NodePort
  selector:
    app: flask-backend
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30080 
